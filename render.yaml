services:
  - type: web
    name: exitprep-api
    env: node
    plan: free
    rootDir: server
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: HUGGING_FACE_API_KEY
        sync: false
      - key: HUGGING_FACE_MODEL
        value: google/flan-t5-small
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

  - type: static
    name: exitprep-web
    rootDir: client
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://exitprep.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
